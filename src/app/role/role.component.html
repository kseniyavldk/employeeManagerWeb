<div class="container" id="user-container">
    <div class="card">
      <div class="card-header">
        <h3>User Manage</h3>
      </div>
      <div class="card--body">
        <table class="table table-hover">
          <thead>
            <th>ID</th>
            <th>Name</th>
          </thead>
          <tbody>
            <tr *ngFor = "let role of roles" class="text-center">
              <td>{{ role.id }}</td>
              <td>{{ role.name }}</td>
              <td>
                <button class="btn btn-warning">Edit</button>
                <button class="btn btn-danger">Delete</button>
              </td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>
