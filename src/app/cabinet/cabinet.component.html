<div class="container" id="user-container">
    <div class="card">
      <div class="card-header">
        <h3>Информация о кабинетах</h3>
        <a class="btn btn-primary" routerLink="/cabinet/add">Добавить</a>
      </div>
      <div class="card--body">
        <table class="table table-hover">
          <thead>
            <th>ID</th>
            <th>Number</th>
          </thead>
          <tbody>
            <tr *ngFor = "let cabinet of cabinets" class="text-center">
              <td>{{ cabinet.id }}</td>
              <td>{{ cabinet.number }}</td>
              <td>
                <button class="btn btn-warning" [routerLink]="['/cabinet/edit', cabinet.id]">Edit</button>
                <button class="btn btn-danger" (click)="openDeleteModal(cabinet.id)">Delete</button>
              </td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>
  
    <!-- Modal -->
<div class="modal fade" id="deleteModal" tabindex="-1" aria-labelledby="exampleModalLabel" aria-hidden="true">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title" id="exampleModalLabel">Warning!</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
      </div>
      <div class="modal-body">
        Are you sure to delete the user?
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
        <button type="button" class="btn btn-danger" (click)="delete()">Confirm Delete</button>
      </div>
    </div>
  </div>
</div>
