<div class="container">
  <legend>Create Item</legend>
  <form>
    <div class="mb-3">
      <label for="txtName" class="form-label">Name</label>
      <input
        type="text"
        name="name"
        ngModel
        class="form-control"
        id="name"
        placeholder="Name"
        required
      />
    </div>
    <div class="mb-3">
      <label for="txtPrice" class="form-label">Lastname</label>
      <input
        type="text"
        name="lastname"
        ngModel
        class="form-control"
        id="lastname"
        placeholder="Lastname"
        required
      />
    </div>
    <div class="mb-3">
      <label for="txtQuantity" class="form-label">Patronymic</label>
      <input
      type="text"
      name="patronymic"
      ngModel
      class="form-control"
      id="patronymic"
      placeholder="Patronymic"
      required
      />
    </div>
    <button type="button" (click)="postUsersAdd()" class="btn btn-primary">
      Create
    </button>
  </form>
</div>
